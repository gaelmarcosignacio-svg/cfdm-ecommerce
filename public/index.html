<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CFDM Fitness</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="login-page-wrapper">
        <div class="login-visual-side">
            <div class="visual-overlay"></div>
            <div class="visual-content">
                <h1 class="logo-grandota">CFDM</h1>
                <p>Centro de Farmacología Deportiva Mexicana</p>
                <span class="poweed-by">Potencia tu rendimiento</span>
            </div>
        </div>

        <div class="login-form-side">
            <div class="form-content-wrapper">
                
                <div class="form-header">
                    <h2>¡Bienvenido de vuelta!</h2>
                    <p>Ingresa tus credenciales para acceder a la plataforma.</p>
                </div>

                <form id="loginForm">
                    <div class="modern-input-group">
                        <label for="correo"><i class="fas fa-envelope"></i> Correo Electrónico</label>
                        <input type="email" id="correo" placeholder="tu@correo.com" required>
                    </div>

                    <div class="modern-input-group">
                        <label for="password"><i class="fas fa-lock"></i> Contraseña</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" placeholder="••••••••" required>
                            <i class="fas fa-eye toggle-password" id="btnTogglePassword"></i>
                        </div>
                    </div>

                    <button type="submit" class="btn-modern-login">Iniciar Sesión</button>
                </form>
                
                <div class="form-footer">
                    <p>¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a></p>
                </div>

            </div>
        </div>
    </div>

    <script>
        //  (MOSTRAR/OCULTAR CONTRASEÑA) ---
        const btnToggle = document.getElementById('btnTogglePassword');
        const inputPassword = document.getElementById('password');

        btnToggle.addEventListener('click', function () {
            // Cambiar el tipo de input entre password y text
            const type = inputPassword.getAttribute('type') === 'password' ? 'text' : 'password';
            inputPassword.setAttribute('type', type);
            
            // Cambiar el icono (ojo abierto / ojo cerrado)
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });

        // --- LÓGICA DE LOGIN  ---
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const correo = document.getElementById('correo').value;
            const password = document.getElementById('password').value;

            try {
                const respuesta = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ correo, password })
                });

                const data = await respuesta.json();

                if (respuesta.ok) {
                    localStorage.setItem('sesionActiva', JSON.stringify(data.usuario));
                    window.location.href = 'tienda.html';
                } else {
                    alert('🔴 Error: ' + data.mensaje);
                }
            } catch (error) {
                console.error(error);
                alert('🔴 Error de conexión con el servidor.');
            }
        });
    </script>
</body>
</html>
